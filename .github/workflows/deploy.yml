name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: GITHUB_REF_NAME
          script: |
            # Exit on error
            set -e

            # Load NVM and Node
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Ensure we have a node version loaded
            if ! command -v node &> /dev/null; then
              # Try to use default alias if nvm is present
              nvm use default || nvm use node || echo "Node not found via NVM"
            fi

            # Navigate to the project directory
            TARGET_DIR="/home/ubuntu/iconicconnect"
            if [ ! -d "$TARGET_DIR" ]; then
              echo "Creating target directory..."
              mkdir -p "$TARGET_DIR"
            fi
            
            cd "$TARGET_DIR"
            
            # Check if directory is a git repository
            if [ ! -d ".git" ]; then
              echo "Initializing repository from branch $GITHUB_REF_NAME..."
              git clone -b $GITHUB_REF_NAME https://github.com/${{ github.repository }}.git .
            else
              echo "Updating from branch $GITHUB_REF_NAME..."
              git fetch origin $GITHUB_REF_NAME
              git reset --hard origin/$GITHUB_REF_NAME
            fi

            # Ensure case_data directory exists and has correct permissions for local uploads
            echo "Setting up case_data directory and permissions..."
            mkdir -p "$TARGET_DIR/case_data"
            chmod -R 777 "$TARGET_DIR/case_data"

            # Remove existing build and modules
            echo "Cleaning old build and modules..."
            rm -rf node_modules .next
            
            # Install dependencies
            echo "Installing dependencies..."
            npm install

            # Apply database schema changes on the server
            echo "Pushing database schema..."
            npm run db:push
            
            # Ensure tsx and pm2 are installed
            echo "Installing global dependencies..."
            npm install -g tsx pm2
            
            # Add npm global bin to PATH
            export PATH=$PATH:$(npm config get prefix)/bin

            # Build the Next.js application
            echo "Building application..."
            npm run build
            
            # --- Infrastructure Setup ---
            echo "Setting up Firewall, Nginx and SSL..."
            
            # Configure Firewall
            # sudo ufw allow 'Nginx Full' || (sudo ufw allow 80/tcp && sudo ufw allow 443/tcp)
            # sudo ufw allow 4000/tcp
            

            # Install Nginx and Certbot if they don't exist
            # sudo apt-get update -y || true
            # sudo apt-get install -y nginx certbot python3-certbot-nginx
            
            # Copy Nginx config from repo
            # sudo cp "$TARGET_DIR/nginx/connect.fynback.com" /etc/nginx/sites-available/connect.fynback.com
            
            # Enable the site
            # sudo ln -sf /etc/nginx/sites-available/connect.fynback.com /etc/nginx/sites-enabled/
            
            # Remove default site if it exists to prevent conflicts
            # sudo rm -f /etc/nginx/sites-enabled/default
            
            # Test Nginx config and reload
            # sudo nginx -t
            sudo systemctl reload nginx
            
            # Issue SSL Certificate (non-interactive)
            # This will automatically modify the Nginx config to add HTTPS
            # sudo certbot --nginx -d connect.fynback.com --non-interactive --agree-tos -m admin@fynback.com --redirect || echo "Certbot already configured or failed."

            # Start or restart services using PM2 ecosystem config
            echo "Starting/Restarting PM2 processes..."
            pm2 start ecosystem.config.js || pm2 restart ecosystem.config.js
            
            # Save PM2 state
            pm2 save
